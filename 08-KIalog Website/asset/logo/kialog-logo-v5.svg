<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-labelledby="logo-title-v5">
  <title id="logo-title-v5">KIalog — Manuel Hirschi</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&amp;family=DM+Sans:opsz,wght@9..40,300&amp;display=swap');
      .logo-ki   { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-style: italic; fill: #006B77; }
      .logo-alog { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; font-style: italic; fill: #1A1A18; }
      .logo-sub  { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 300; font-style: normal; fill: #5A5A55; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
  </defs>
  <!-- KIalog -->
  <text x="4" y="38" font-size="40">
    <tspan class="logo-ki">KI</tspan><tspan class="logo-alog">alog</tspan>
  </text>
  <!-- HIRSCHI -3° -->
  <text x="5" y="56" font-size="12" class="logo-sub" transform="rotate(-3, 5, 56)">Hirschi</text>
</svg>
