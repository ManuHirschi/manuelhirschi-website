<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none">
  <defs>
    <!-- Sketchy filter: slight roughness on strokes -->
    <filter id="sketch" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Watercolor wash -->
    <filter id="wash">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <style>
    @keyframes draw { from { stroke-dashoffset: var(--l); } to { stroke-dashoffset: 0; } }
    @keyframes pop { 0% { opacity:0; transform:scale(0.7); } 100% { opacity:1; transform:scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    .sk { stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#sketch); }
    .d1 { --l:800; stroke-dasharray:800; stroke-dashoffset:800; animation: draw 1.4s cubic-bezier(.4,0,.2,1) 0.1s forwards; }
    .d2 { --l:600; stroke-dasharray:600; stroke-dashoffset:600; animation: draw 1.1s cubic-bezier(.4,0,.2,1) 0.5s forwards; }
    .d3 { --l:400; stroke-dasharray:400; stroke-dashoffset:400; animation: draw 0.9s cubic-bezier(.4,0,.2,1) 0.9s forwards; }
    .d4 { --l:250; stroke-dasharray:250; stroke-dashoffset:250; animation: draw 0.7s cubic-bezier(.4,0,.2,1) 1.2s forwards; }
    .d5 { --l:180; stroke-dasharray:180; stroke-dashoffset:180; animation: draw 0.6s cubic-bezier(.4,0,.2,1) 1.5s forwards; }
    .d6 { --l:120; stroke-dasharray:120; stroke-dashoffset:120; animation: draw 0.5s cubic-bezier(.4,0,.2,1) 1.8s forwards; }
    .f1 { opacity:0; animation: fadeIn .6s ease .3s forwards; }
    .f2 { opacity:0; animation: fadeIn .6s ease .7s forwards; }
    .f3 { opacity:0; animation: fadeIn .6s ease 1.1s forwards; }
    .f4 { opacity:0; animation: fadeIn .5s ease 1.4s forwards; }
    .f5 { opacity:0; animation: fadeIn .5s ease 1.7s forwards; }
    .f6 { opacity:0; animation: fadeIn .5s ease 2.0s forwards; }
    .pop1 { opacity:0; transform-origin: center; animation: pop .4s cubic-bezier(.34,1.56,.64,1) 1.6s forwards; }
    .pop2 { opacity:0; transform-origin: center; animation: pop .4s cubic-bezier(.34,1.56,.64,1) 1.9s forwards; }
    .pop3 { opacity:0; transform-origin: center; animation: pop .4s cubic-bezier(.34,1.56,.64,1) 2.1s forwards; }
    .fl { animation: float 3s ease-in-out infinite; }
    .fl2 { animation: float 3.5s ease-in-out 0.5s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .d1,.d2,.d3,.d4,.d5,.d6 { stroke-dashoffset:0; animation:none; }
      .f1,.f2,.f3,.f4,.f5,.f6,.pop1,.pop2,.pop3 { opacity:1; animation:none; }
      .fl,.fl2 { animation:none; }
    }
  </style>

  <!-- ============ WATERCOLOR WASHES ============ -->
  <!-- Desk surface wash -->
  <ellipse class="f1" filter="url(#wash)" cx="280" cy="340" rx="220" ry="18" fill="#D7BCED" opacity="0.12"/>
  <!-- Laptop screen glow -->
  <rect class="f2" filter="url(#wash)" x="135" y="105" width="230" height="160" rx="12" fill="#3881F1" opacity="0.06"/>
  <!-- Cup wash -->
  <ellipse class="f4" filter="url(#wash)" cx="78" cy="310" rx="30" ry="12" fill="#01C476" opacity="0.10"/>

  <!-- ============ DESK ============ -->
  <!-- Desk top - wobbly line -->
  <path class="sk d1" stroke="#2A2A2A" stroke-width="2.2"
    d="M30 332 C32 330 48 328 80 328 C140 327 200 326 280 327 C360 328 440 329 500 330 C520 331 530 332 532 333"/>
  <!-- Desk legs -->
  <path class="sk d2" stroke="#2A2A2A" stroke-width="2"
    d="M80 332 C79 345 78 365 77 385 M82 332 C83 346 84 366 85 386"/>
  <path class="sk d2" stroke="#2A2A2A" stroke-width="2"
    d="M468 332 C467 345 466 365 465 385 M470 332 C471 346 472 366 473 386"/>
  <!-- Desk shelf -->
  <path class="sk d3" stroke="#2A2A2A" stroke-width="1.3" opacity="0.4"
    d="M78 360 C120 359 420 358 470 360"/>

  <!-- ============ LAPTOP ============ -->
  <!-- Screen back -->
  <path class="sk d1" stroke="#2A2A2A" stroke-width="2.5"
    d="M128 108 C126 104 130 98 136 98 L370 96 C377 96 381 101 380 106 L376 280 C375 284 372 288 366 288 L140 290 C134 290 130 286 130 282 Z"/>
  <!-- Screen bezel -->
  <path class="sk d2" stroke="#2A2A2A" stroke-width="1.6"
    d="M146 118 C144 115 147 112 150 112 L356 110 C360 110 362 114 362 117 L359 268 C358 272 356 274 352 274 L152 276 C148 276 146 273 146 269 Z"/>

  <!-- Screen content: AI text lines (wobbly) -->
  <path class="sk d3" stroke="#3881F1" stroke-width="1.8" d="M162 138 C170 137 210 137 265 138 C270 138.5 275 138 280 138"/>
  <path class="sk d3" stroke="#3881F1" stroke-width="1.8" d="M162 156 C175 155 240 155 310 156 C330 156.5 340 156 345 156"/>
  <path class="sk d3" stroke="#3881F1" stroke-width="1.8" d="M162 174 C170 173 220 174 275 174 C295 174.5 305 174 310 174"/>
  <path class="sk d3" stroke="#3881F1" stroke-width="1.8" d="M162 192 C180 191 250 192 315 192 C330 192.5 335 192 340 192"/>
  <path class="sk d3" stroke="#3881F1" stroke-width="1.8" d="M162 210 C170 209 200 210 235 210 C245 210.5 250 210 255 210"/>
  <path class="sk d4" stroke="#3881F1" stroke-width="1.8" d="M162 228 C175 227 220 228 280 228 C300 228.5 310 228 315 228"/>
  <path class="sk d4" stroke="#3881F1" stroke-width="1.4" opacity="0.5" d="M162 246 C170 245 200 246 230 246"/>

  <!-- ✓ Check on line 1 -->
  <g class="pop1">
    <path class="sk" stroke="#01C476" stroke-width="2.8"
      d="M290 132 C292 135 295 140 298 144 C302 138 310 128 316 124"/>
  </g>
  <!-- ✓ Check on line 2 -->
  <g class="pop1">
    <path class="sk" stroke="#01C476" stroke-width="2.8"
      d="M348 150 C350 153 353 158 356 162 C360 156 366 146 370 142"/>
  </g>
  <!-- ? on line 3 -->
  <g class="pop2">
    <path class="sk" stroke="#F6612E" stroke-width="2.5"
      d="M318 167 C318 164 322 162 325 162 C328 162 331 164 331 167 C331 170 327 172 325 174 M325 179 L325 180"/>
  </g>
  <!-- ✗ on line 4 -->
  <g class="pop2">
    <path class="sk" stroke="#F6612E" stroke-width="2.5"
      d="M344 186 C347 189 350 192 353 195 M353 186 C350 189 347 192 344 195"/>
  </g>
  <!-- ✓ on line 5 -->
  <g class="pop3">
    <path class="sk" stroke="#01C476" stroke-width="2.8"
      d="M260 204 C262 207 265 212 268 216 C272 210 278 200 282 196"/>
  </g>
  <!-- ~ on line 6 (uncertain) -->
  <g class="pop3">
    <path class="sk" stroke="#D7BCED" stroke-width="2.2"
      d="M320 224 C324 220 328 228 332 224 C336 220 340 228 344 224"/>
  </g>

  <!-- Laptop keyboard/base -->
  <path class="sk d2" stroke="#2A2A2A" stroke-width="2.2"
    d="M118 290 C116 295 112 318 108 326 L398 324 C394 316 390 293 388 288"/>
  <!-- Trackpad -->
  <path class="sk d3" stroke="#2A2A2A" stroke-width="1.2" opacity="0.4"
    d="M228 302 C230 300 232 300 236 300 L272 300 C276 300 278 302 278 304 L278 318 C278 320 276 322 272 322 L236 322 C232 322 230 320 230 318 Z"/>
  <!-- Keyboard dots -->
  <g class="f3" opacity="0.3">
    <circle cx="175" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="190" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="205" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="220" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="290" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="305" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="320" cy="298" r="1.5" fill="#2A2A2A"/>
    <circle cx="335" cy="298" r="1.5" fill="#2A2A2A"/>
  </g>

  <!-- ============ RED PEN (lying on desk) ============ -->
  <g class="f4">
    <path class="sk d5" stroke="#F6612E" stroke-width="3"
      d="M400 306 C404 304 430 288 448 278"/>
    <path class="sk d5" stroke="#2A2A2A" stroke-width="2"
      d="M396 308 C398 306 400 305 402 304 L448 278 L454 282 L408 310 C406 311 404 312 402 312 Z"/>
    <path d="M448 278 L454 282 L458 275 Z" fill="#F6612E" opacity="0.7" class="f5"/>
    <!-- Pen cap -->
    <path class="sk d5" stroke="#2A2A2A" stroke-width="1.8"
      d="M392 314 C390 316 386 318 384 318 L378 314 C380 312 384 310 386 310 Z"/>
  </g>

  <!-- ============ COFFEE CUP ============ -->
  <g class="f4">
    <!-- Cup body -->
    <path class="sk d4" stroke="#2A2A2A" stroke-width="2"
      d="M52 278 C50 280 48 290 48 300 C48 312 56 322 68 324 L82 324 C94 322 102 312 102 300 C102 290 100 280 98 278"/>
    <!-- Cup handle -->
    <path class="sk d5" stroke="#2A2A2A" stroke-width="1.8"
      d="M102 288 C108 286 114 290 114 298 C114 306 108 310 102 308"/>
    <!-- Coffee fill -->
    <ellipse class="f4" cx="75" cy="282" rx="24" ry="4" fill="#8B6914" opacity="0.15"/>
    <!-- Steam wisps -->
    <path class="sk d6" stroke="#2A2A2A" stroke-width="1" opacity="0.2"
      d="M62 272 C60 264 66 260 64 252"/>
    <path class="sk d6" stroke="#2A2A2A" stroke-width="1" opacity="0.2"
      d="M78 270 C76 262 82 258 80 250"/>
    <path class="sk d6" stroke="#2A2A2A" stroke-width="1" opacity="0.15"
      d="M88 272 C90 266 86 262 88 256"/>
  </g>

  <!-- ============ STICKY NOTE (tilted) ============ -->
  <g class="f5" transform="rotate(-6, 440, 260)">
    <rect x="424" y="244" width="52" height="52" rx="2" fill="#01C476" opacity="0.12" class="f5"/>
    <path class="sk d6" stroke="#2A2A2A" stroke-width="1.3"
      d="M426 246 L474 244 L476 294 L428 296 Z"/>
    <!-- Mini text lines on sticky -->
    <line class="sk d6" stroke="#2A2A2A" stroke-width="0.8" opacity="0.4" x1="432" y1="256" x2="468" y2="255"/>
    <line class="sk d6" stroke="#2A2A2A" stroke-width="0.8" opacity="0.4" x1="432" y1="264" x2="460" y2="263"/>
    <line class="sk d6" stroke="#2A2A2A" stroke-width="0.8" opacity="0.4" x1="432" y1="272" x2="464" y2="271"/>
    <!-- Tiny checkmark on sticky -->
    <path class="sk" stroke="#01C476" stroke-width="1.8" d="M436 282 L440 287 L448 278" class="pop3"/>
  </g>

  <!-- ============ SMALL PLANT ============ -->
  <g class="f5">
    <!-- Pot -->
    <path class="sk d5" stroke="#2A2A2A" stroke-width="1.8"
      d="M488 298 L484 328 C484 330 486 332 490 332 L510 332 C514 332 516 330 516 328 L512 298"/>
    <rect class="f5" x="486" y="300" width="28" height="30" rx="2" fill="#F6612E" opacity="0.10"/>
    <!-- Stems + leaves -->
    <path class="sk d5" stroke="#01C476" stroke-width="1.8"
      d="M500 298 C500 286 496 274 492 266"/>
    <path class="sk d6" stroke="#01C476" stroke-width="1.8"
      d="M500 298 C502 284 508 272 514 264"/>
    <path class="sk d6" stroke="#01C476" stroke-width="1.8"
      d="M500 298 C499 290 500 278 500 268"/>
    <!-- Leaf shapes -->
    <path class="sk d6" stroke="#01C476" stroke-width="1.2"
      d="M492 266 C486 260 484 254 488 250 C492 254 492 260 492 266"/>
    <path class="sk d6" stroke="#01C476" stroke-width="1.2"
      d="M514 264 C520 258 524 252 520 248 C516 252 514 258 514 264"/>
    <path class="sk d6" stroke="#01C476" stroke-width="1.2"
      d="M500 268 C496 262 494 256 498 252 C502 256 502 262 500 268"/>
  </g>

  <!-- ============ FLOATING ELEMENTS ============ -->
  <!-- Magnifying glass (= prüfen) -->
  <g class="pop2 fl">
    <circle class="sk" stroke="#3881F1" stroke-width="2" cx="428" cy="60" r="16"/>
    <line class="sk" stroke="#3881F1" stroke-width="2.5" x1="440" y1="72" x2="452" y2="84"/>
    <ellipse cx="428" cy="60" rx="14" ry="14" fill="#3881F1" opacity="0.05"/>
    <!-- Sparkle inside lens -->
    <path class="sk" stroke="#3881F1" stroke-width="1.2" opacity="0.5" d="M422 54 L424 52 M420 58 L418 56"/>
  </g>

  <!-- Light bulb (= Urteil) -->
  <g class="pop3 fl2">
    <path class="sk" stroke="#F6612E" stroke-width="1.8"
      d="M68 72 C60 60 62 44 72 38 C82 32 94 36 98 48 C102 58 96 66 92 72 L68 72"/>
    <path class="sk" stroke="#F6612E" stroke-width="1.5" d="M72 76 L88 76 M74 80 L86 80"/>
    <ellipse cx="80" cy="55" rx="10" ry="14" fill="#F6612E" opacity="0.06"/>
    <!-- Rays -->
    <line class="sk" stroke="#F6612E" stroke-width="1" opacity="0.3" x1="80" y1="28" x2="80" y2="22"/>
    <line class="sk" stroke="#F6612E" stroke-width="1" opacity="0.3" x1="56" y1="44" x2="50" y2="40"/>
    <line class="sk" stroke="#F6612E" stroke-width="1" opacity="0.3" x1="104" y1="44" x2="110" y2="40"/>
  </g>

  <!-- Decorative dots cluster -->
  <g class="f6">
    <circle cx="480" cy="130" r="3" fill="#D7BCED" opacity="0.4"/>
    <circle cx="492" cy="142" r="2" fill="#01C476" opacity="0.3"/>
    <circle cx="476" cy="148" r="2.5" fill="#3881F1" opacity="0.25"/>
    <circle cx="500" cy="120" r="1.8" fill="#F6612E" opacity="0.2"/>

    <circle cx="28" cy="140" r="2.5" fill="#3881F1" opacity="0.2"/>
    <circle cx="40" cy="130" r="2" fill="#D7BCED" opacity="0.3"/>
    <circle cx="24" cy="158" r="1.8" fill="#01C476" opacity="0.25"/>
  </g>
</svg>