<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <style>
    .sketch-stroke { stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .ink { stroke: #2A2A2A; }
    .blue { stroke: #3881F1; }
    .green { stroke: #01C476; }
    .orange { stroke: #F6612E; }
    .lilac { stroke: #D7BCED; }
    .fill-blue { fill: #3881F1; opacity: 0.08; }
    .fill-green { fill: #01C476; opacity: 0.12; }
    .fill-lilac { fill: #D7BCED; opacity: 0.15; }
    .fill-orange { fill: #F6612E; opacity: 0.10; }

    /* Paint-on animation */
    @keyframes draw {
      from { stroke-dashoffset: var(--len); }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .draw-1 { --len: 600; stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 1.2s ease-out 0.2s forwards; }
    .draw-2 { --len: 400; stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 1s ease-out 0.6s forwards; }
    .draw-3 { --len: 300; stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.8s ease-out 1s forwards; }
    .draw-4 { --len: 200; stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.7s ease-out 1.3s forwards; }
    .draw-5 { --len: 150; stroke-dasharray: 150; stroke-dashoffset: 150; animation: draw 0.6s ease-out 1.6s forwards; }
    .fade-1 { opacity: 0; animation: fadeIn 0.5s ease-out 0.4s forwards; }
    .fade-2 { opacity: 0; animation: fadeIn 0.5s ease-out 0.8s forwards; }
    .fade-3 { opacity: 0; animation: fadeIn 0.5s ease-out 1.2s forwards; }
    .fade-4 { opacity: 0; animation: fadeIn 0.5s ease-out 1.6s forwards; }
    .fade-5 { opacity: 0; animation: fadeIn 0.5s ease-out 2.0s forwards; }

    @media (prefers-reduced-motion: reduce) {
      .draw-1, .draw-2, .draw-3, .draw-4, .draw-5 { stroke-dashoffset: 0; animation: none; }
      .fade-1, .fade-2, .fade-3, .fade-4, .fade-5 { opacity: 1; animation: none; }
    }
  </style>

  <!-- Laptop body -->
  <rect class="fill-blue fade-1" x="120" y="130" width="260" height="170" rx="8"/>
  <path class="sketch-stroke ink draw-1" stroke-width="2.5"
    d="M125 135 C123 132 128 128 132 128 L368 128 C374 128 378 132 378 138 L378 295 C378 298 375 302 370 302 L132 302 C127 302 124 298 124 294 Z"/>

  <!-- Screen -->
  <rect class="fill-lilac fade-2" x="140" y="145" width="222" height="140" rx="4"/>
  <path class="sketch-stroke ink draw-2" stroke-width="1.8"
    d="M142 148 C141 146 143 143 146 143 L358 143 C361 143 363 146 363 149 L363 282 C363 285 361 287 358 287 L146 287 C143 287 141 285 141 282 Z"/>

  <!-- Screen content: AI text lines -->
  <line class="sketch-stroke blue draw-3" stroke-width="2" x1="155" y1="165" x2="290" y2="165"/>
  <line class="sketch-stroke blue draw-3" stroke-width="2" x1="155" y1="180" x2="340" y2="180"/>
  <line class="sketch-stroke blue draw-3" stroke-width="2" x1="155" y1="195" x2="310" y2="195"/>
  <line class="sketch-stroke blue draw-3" stroke-width="2" x1="155" y1="210" x2="330" y2="210"/>
  <line class="sketch-stroke blue draw-3" stroke-width="2" x1="155" y1="225" x2="270" y2="225"/>

  <!-- Checkmark on line 1 (green, teacher approved) -->
  <path class="sketch-stroke green draw-4" stroke-width="3"
    d="M300 160 L308 170 L322 152"/>

  <!-- Question mark on line 3 (orange, needs checking) -->
  <text class="orange fade-4" x="318" y="200" font-family="Figtree, sans-serif" font-size="18" font-weight="700" fill="#F6612E">?</text>

  <!-- X on line 4 (red/orange, rejected) -->
  <path class="sketch-stroke orange draw-5" stroke-width="2.5"
    d="M338 205 L348 215 M348 205 L338 215"/>

  <!-- Checkmark on line 2 (green) -->
  <path class="sketch-stroke green draw-4" stroke-width="3"
    d="M346 175 L352 183 L364 168"/>

  <!-- Laptop base/keyboard -->
  <path class="sketch-stroke ink draw-2" stroke-width="2.5"
    d="M108 302 C108 302 115 310 120 312 L382 312 C387 310 394 302 394 302"/>
  <path class="sketch-stroke ink draw-2" stroke-width="1.5"
    d="M220 307 L282 307"/>

  <!-- Red pen (teacher's tool) -->
  <g class="fade-3">
    <path class="sketch-stroke orange draw-4" stroke-width="2.5"
      d="M390 180 L430 120 L436 124 L396 184 Z"/>
    <path d="M430 120 L436 124 L440 116 Z" fill="#F6612E" opacity="0.8"/>
  </g>

  <!-- Coffee cup -->
  <g class="fade-4">
    <path class="sketch-stroke ink draw-5" stroke-width="2"
      d="M60 260 L60 300 C60 308 68 314 80 314 L92 314 C104 314 112 308 112 300 L112 260"/>
    <path class="sketch-stroke ink draw-5" stroke-width="2"
      d="M112 272 C118 272 124 278 124 286 C124 294 118 298 112 298"/>
    <rect class="fill-green fade-4" x="62" y="262" width="48" height="50" rx="4"/>
    <!-- Steam -->
    <path class="sketch-stroke ink draw-5" stroke-width="1.2" opacity="0.3"
      d="M75 255 C75 248 80 248 80 242 M88 255 C88 250 92 250 92 244"/>
  </g>

  <!-- Small plant -->
  <g class="fade-5">
    <path class="sketch-stroke green draw-5" stroke-width="2"
      d="M50 200 C50 190 40 178 35 172 M50 200 C50 188 55 175 62 168 M50 200 C48 192 52 180 50 170"/>
    <rect class="fill-orange fade-5" x="40" y="198" width="22" height="28" rx="3"/>
    <path class="sketch-stroke ink draw-5" stroke-width="1.8"
      d="M42 200 L42 226 C42 228 44 230 47 230 L57 230 C60 230 62 228 62 226 L62 200"/>
  </g>

  <!-- Floating thought: magnifying glass (= prüfen) -->
  <g class="fade-5">
    <circle class="sketch-stroke blue draw-5" stroke-width="2" cx="430" cy="80" r="18"/>
    <line class="sketch-stroke blue draw-5" stroke-width="2.5" x1="443" y1="93" x2="456" y2="106"/>
    <circle class="fill-blue fade-5" cx="430" cy="80" r="16"/>
  </g>

  <!-- Small decorative dots -->
  <circle class="fade-5" cx="470" cy="150" r="3" fill="#D7BCED" opacity="0.5"/>
  <circle class="fade-5" cx="480" cy="170" r="2" fill="#01C476" opacity="0.4"/>
  <circle class="fade-5" cx="462" cy="168" r="2.5" fill="#3881F1" opacity="0.3"/>
</svg>